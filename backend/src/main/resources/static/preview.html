<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TTS Reader Preview</title>
    <style>
      :root {
        --surface-strong: rgba(255, 255, 255, 0.96);
        --surface-border: rgba(105, 127, 173, 0.14);
        --ink-strong: #182235;
        --ink: #30415f;
        --ink-soft: #6d7891;
        font-family:
          "SF Pro Display",
          "PingFang SC",
          "Hiragino Sans GB",
          "Microsoft YaHei",
          "Segoe UI",
          sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(63, 116, 247, 0.12), transparent 28%),
          radial-gradient(circle at bottom right, rgba(102, 156, 95, 0.14), transparent 32%),
          linear-gradient(180deg, #f9fbff 0%, #f4f7fb 32%, #edf3ec 100%);
      }

      .reader-shell {
        min-height: 100vh;
      }

      .toolbar {
        position: sticky;
        top: 0;
        z-index: 20;
        padding: 18px 28px 16px;
        background: rgba(248, 251, 255, 0.82);
        border-bottom: 1px solid rgba(154, 170, 203, 0.18);
        backdrop-filter: blur(18px);
      }

      .toolbar-title {
        color: var(--ink-strong);
        font-size: clamp(22px, 2vw, 28px);
        font-weight: 700;
        line-height: 1.15;
      }

      .toolbar-center {
        position: fixed;
        top: 50%;
        right: 28px;
        z-index: 40;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
        padding: 12px;
        border: 1px solid rgba(154, 170, 203, 0.2);
        border-radius: 24px;
        background: rgba(248, 251, 255, 0.78);
        box-shadow: 0 18px 44px rgba(73, 95, 137, 0.16);
        backdrop-filter: blur(18px);
        transform: translateY(-50%);
      }

      .voice-stack {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
      }

      .voice-badge,
      .toolbar-icon,
      .play-button,
      .speed-button,
      .preview-chip {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--surface-border);
        background: rgba(255, 255, 255, 0.9);
        color: #4f5f7d;
      }

      .voice-badge {
        width: 68px;
        height: 68px;
        border-radius: 999px;
        border-width: 5px;
        border-color: #0891b2;
        color: #0891b2;
        font-size: 26px;
        font-weight: 700;
      }

      .voice-stack-name {
        max-width: 110px;
        color: #61708d;
        font-size: 12px;
        font-weight: 700;
        text-align: center;
      }

      .toolbar-icon,
      .speed-button {
        width: 46px;
        height: 46px;
        border-radius: 16px;
      }

      .play-button {
        width: 62px;
        height: 62px;
        border: 0;
        border-radius: 999px;
        color: #fff;
        background: linear-gradient(180deg, #2f7cff 0%, #2067eb 100%);
        box-shadow: 0 18px 36px rgba(47, 108, 246, 0.32);
      }

      .timeline {
        max-width: 1320px;
        margin: 10px auto 0;
        padding: 0 132px 6px 28px;
      }

      .timeline-labels {
        display: flex;
        justify-content: space-between;
        margin-bottom: 10px;
        color: #92a0bb;
        font-size: 14px;
      }

      .timeline-track {
        position: relative;
        height: 7px;
        border-radius: 999px;
        background: rgba(111, 138, 207, 0.14);
      }

      .timeline-fill {
        width: 36%;
        height: 100%;
        border-radius: 999px;
        background: linear-gradient(90deg, #2f7cff 0%, #7ca5ff 100%);
      }

      .reader-main {
        max-width: 1320px;
        margin: 30px auto 0;
        padding: 0 132px 0 28px;
      }

      .reader-grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        gap: 20px;
      }

      .reader-card {
        min-height: 620px;
        padding: 22px;
        border: 1px solid rgba(122, 146, 193, 0.14);
        border-radius: 32px;
        background: linear-gradient(180deg, var(--surface-strong), rgba(248, 251, 255, 0.94));
        box-shadow: 0 30px 80px rgba(49, 71, 112, 0.14);
      }

      .card-heading {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 14px;
      }

      .card-label {
        color: var(--ink-soft);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .preview-chip {
        min-height: 32px;
        padding: 0 10px;
        border-radius: 10px;
        font-size: 13px;
        font-weight: 700;
      }

      .panel {
        min-height: 500px;
        padding: 24px;
        border: 1px solid rgba(122, 146, 193, 0.14);
        border-radius: 24px;
        background: linear-gradient(180deg, rgba(254, 255, 255, 0.94) 0%, rgba(249, 251, 255, 0.94) 100%);
      }

      .editor {
        color: #1b2740;
        font-size: clamp(21px, 2vw, 24px);
        line-height: 1.95;
        white-space: pre-wrap;
      }

      .reading {
        color: #20304e;
        font-size: clamp(21px, 2vw, 25px);
        line-height: 1.95;
      }

      .sentence {
        display: inline;
        border-radius: 16px;
        padding: 0.08em 0.16em;
        color: #495977;
      }

      .sentence.active {
        background: linear-gradient(180deg, rgba(211, 231, 255, 0.98), rgba(230, 240, 255, 0.98));
        color: #203152;
      }

      .char.active {
        color: #fff;
        background: rgba(53, 95, 214, 0.96);
        border-radius: 6px;
        box-shadow: 0 0 0 4px rgba(53, 95, 214, 0.12);
      }

      @media (max-width: 980px) {
        .toolbar-center {
          right: 12px;
        }

        .timeline,
        .reader-main {
          padding-left: 16px;
          padding-right: 16px;
        }

        .reader-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
